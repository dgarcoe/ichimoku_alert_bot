# =====================================================================
# Ichimoku Chikou Breakout Telegram Bot  --  example configuration
# =====================================================================
#
# Any ${VAR} or ${VAR:-default} reference below is expanded from
# environment variables at load time (see .env.example).
#
# Data sources used here are 100% free and require no API keys:
#   - binance : public spot REST API (crypto)
#   - yahoo   : Yahoo Finance via the yfinance library (forex, stocks,
#               indices, crypto, futures)

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  # Comma-separated list, or a YAML list. Get your ID by messaging
  # @userinfobot on Telegram after starting a chat with your bot.
  chat_ids: "${TELEGRAM_CHAT_IDS}"

ichimoku:
  tenkan: 9
  kijun: 26
  senkou_b: 52
  displacement: 26

scan:
  # How often (seconds) to poll. For 1h timeframe, every 5-10 minutes
  # is plenty; for 1d, every 30-60 minutes is fine.
  poll_interval_seconds: 300
  # How many bars back we look for the qualifying Tenkan/Kijun cross
  # that precedes the Chikou breakout.
  cross_lookback_bars: 60
  # How many closed bars of history to pull per scan. Must comfortably
  # exceed senkou_b + displacement (200 is a safe default).
  history_bars: 200

# Where to persist already-alerted state (Docker-mounted volume).
state_path: "/data/seen_signals.json"
startup_message: true

# ----------------------------- Watchlist -----------------------------
# Each item:
#   symbol     -- ticker as the source expects it
#   source     -- "binance" or "yahoo"
#   timeframe  -- 1m 5m 15m 30m 1h 2h 4h 6h 8h 12h 1d 1w
#                 (Yahoo synthesizes 2h..12h by resampling 1h bars; Binance
#                  supports them natively.)
#   label      -- optional pretty name shown in alerts
#
# Symbol cheat sheet:
#   Binance crypto :  BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, ...
#   Yahoo forex    :  EURUSD=X, GBPUSD=X, USDJPY=X, AUDUSD=X, ...
#                     (the bot also accepts "EUR/USD" or "EURUSD" -- it
#                      auto-translates to the =X form)
#   Yahoo crypto   :  BTC-USD, ETH-USD, SOL-USD, ...  (alternative to Binance)
#   Yahoo futures  :  GC=F (gold), CL=F (WTI crude), ...
#
# Yahoo intraday limitation: intervals < 1d are only available for the
# last ~60 days, and 1m for the last ~7 days. For Ichimoku you want
# 200+ bars, so on 4h or below stick to actively-traded pairs.

symbols:
  # --- Crypto via Binance (free, fast, no auth) ---
  - { symbol: "BTCUSDT", source: "binance", timeframe: "4h", label: "BTC/USDT" }
  - { symbol: "BTCUSDT", source: "binance", timeframe: "1d", label: "BTC/USDT" }
  - { symbol: "ETHUSDT", source: "binance", timeframe: "4h", label: "ETH/USDT" }
  - { symbol: "SOLUSDT", source: "binance", timeframe: "4h", label: "SOL/USDT" }

  # --- Forex via Yahoo (free, no auth) ---
  - { symbol: "EUR/USD", source: "yahoo", timeframe: "1h", label: "EUR/USD" }
  - { symbol: "EUR/USD", source: "yahoo", timeframe: "1d", label: "EUR/USD" }
  - { symbol: "GBP/USD", source: "yahoo", timeframe: "1h", label: "GBP/USD" }
  - { symbol: "USD/JPY", source: "yahoo", timeframe: "1h", label: "USD/JPY" }
  - { symbol: "AUD/USD", source: "yahoo", timeframe: "1d", label: "AUD/USD" }

  # --- Bonus: gold and crude oil futures (Yahoo) ---
  # - { symbol: "GC=F", source: "yahoo", timeframe: "1d", label: "Gold" }
  # - { symbol: "CL=F", source: "yahoo", timeframe: "1d", label: "WTI Crude" }
